<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summit Group Acquisitions - KPI Dashboard</title>

  <!-- Tailwind CSS from CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #F0F2F5;
    }

    .navy-header {
      background-color: #1B2A4A;
    }

    .kpi-card {
      transition: all 0.2s ease;
      cursor: pointer;
      background: white;
      border-radius: 8px;
      padding: 16px;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .kpi-card:hover {
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .kpi-card.active {
      border: 3px solid #2E75B6;
      box-shadow: 0 0 0 4px rgba(46, 117, 182, 0.1);
    }

    .section-title {
      padding: 12px 16px;
      border-radius: 6px 6px 0 0;
      font-weight: 600;
      color: white;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .section-body {
      background: white;
      border-radius: 0 0 6px 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 16px;
    }

    .chart-container {
      width: 100%;
      height: 300px;
      position: relative;
      margin: 16px 0;
    }

    .table-container {
      overflow-x: auto;
      margin-top: 16px;
    }

    table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }

    th {
      background-color: #f5f5f5;
      padding: 10px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    tr:hover {
      background-color: #fafafa;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .badge-uc {
      background-color: #e3f2fd;
      color: #1976d2;
    }

    .badge-listed {
      background-color: #fff3e0;
      color: #f57c00;
    }

    .badge-won {
      background-color: #e8f5e9;
      color: #388e3c;
    }

    .badge-lost {
      background-color: #ffebee;
      color: #d32f2f;
    }

    .tab-button {
      padding: 10px 16px;
      border: none;
      background: #e0e0e0;
      color: #333;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      border-radius: 4px 4px 0 0;
      margin-right: 2px;
    }

    .tab-button.active {
      background-color: white;
      color: #1B2A4A;
      border-bottom: 3px solid #2E75B6;
    }

    .tab-button:hover {
      background-color: #f0f0f0;
    }

    .close-btn {
      cursor: pointer;
      color: #666;
      font-weight: bold;
      font-size: 20px;
      padding: 4px 8px;
      float: right;
    }

    .close-btn:hover {
      color: #000;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

  <div class="navy-header text-white p-6 shadow-lg">

    <p class="text-sm text-gray-300 mt-1">Deal Pipeline KPI Dashboard</p>

  <!-- Tab Navigation -->
  <div class="px-6 pt-6 flex gap-1 flex-wrap">
    <button class="tab-button active" onclick="switchTab('executive')">Executive Dashboard</button>
    <button class="tab-button" onclick="switchTab('pipeline')">Pipeline Analytics</button>
    <button class="tab-button" onclick="switchTab('team')">Team Scorecard</button>
    <button class="tab-button" onclick="switchTab('monthly')">Monthly Trends</button>
    <button class="tab-button" onclick="switchTab('roi')">Marketing ROI</button>

  <!-- Main Content Area -->

    <!-- EXECUTIVE DASHBOARD TAB -->
    <div id="executive" class="tab-content active">
      <div id="execKPIs" class="grid gap-4 mb-6" style="grid-template-columns: repeat(8, 1fr);"></div>
      <div id="execKPIs2" class="grid gap-4 mb-6" style="grid-template-columns: repeat(8, 1fr);"></div>

      <!-- Drill-down table -->

        </div>
      </div>

      <!-- Strategy Performance -->

        </div>
        <div>

      <!-- Revenue by Strategy -->

        <div class="section-body">
          <div class="chart-container">
            <canvas id="revenueByStrategyChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- PIPELINE ANALYTICS TAB -->
    <div id="pipeline" class="tab-content">
      <div id="pipelineKPIs" class="grid gap-4 mb-6" style="grid-template-columns: repeat(5, 1fr);"></div>

      <div id="agingBucketsRow" class="grid gap-4 mb-6" style="grid-template-columns: repeat(4, 1fr);"></div>

      <!-- Aging chart -->
      <div>
        <div class="section-title" style="background-color: #2F9599;">Deal Aging Analysis</div>
        <div class="section-body">
          <div class="chart-container">
            <canvas id="agingChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Drill-down table for aging -->
      <div id="pipelineDrillDown" style="display: none;">
        <div class="section-title" style="background-color: #1B2A4A;">
          <span id="pipelineDrillDownTitle"></span>
          <span class="close-btn" onclick="closeDrillDown('pipeline')">×</span>
        </div>
        <div class="section-body">
          <div id="pipelineDrillDownTable" class="table-container"></div>
        </div>
      </div>

      <!-- Market breakdown -->
      <div>
        <div class="section-title" style="background-color: #ED7D31;">Market Breakdown</div>
        <div class="section-body">
          <div class="chart-container">
            <canvas id="marketChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- TEAM SCORECARD TAB -->
    <div id="team" class="tab-content">
      <div id="teamCards" class="grid gap-6 mb-6" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));"></div>

      <!-- Drill-down table for team -->
      <div id="teamDrillDown" style="display: none;">
        <div class="section-title" style="background-color: #1B2A4A;">
          <span id="teamDrillDownTitle"></span>
          <span class="close-btn" onclick="closeDrillDown('team')">×</span>
        </div>
        <div class="section-body">
          <div id="teamDrillDownTable" class="table-container"></div>
        </div>
      </div>
    </div>

    <!-- MONTHLY TRENDS TAB -->
    <div id="monthly" class="tab-content">
      <div class="grid gap-6 mb-6" style="grid-template-columns: repeat(2, 1fr);">
        <div>
          <div class="section-title" style="background-color: #2E75B6;">Deals by Month</div>
          <div class="section-body">
            <div class="chart-container">
              <canvas id="monthlyDealsChart"></canvas>
            </div>
          </div>
        </div>
        <div>
          <div class="section-title" style="background-color: #548235;">Revenue by Month</div>
          <div class="section-body">
            <div class="chart-container">
              <canvas id="monthlyRevenueChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MARKETING ROI TAB -->

                  <th>ROI %</th>
                </tr>
              </thead>
              <tbody id="roiTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

      {id:"Manhattan Deal",address:"827 Moro St, Manhattan, KS",market:"KS",acq:"Luka",dispo:"Luka",status:"Closed - Lost",strategy:"Subject-to",exit:"Assignment",ucDate:"2024-06-01",closeDate:"2024-07-11",month:"07-24",contract:140000,listed:160000,buyer:null,repairs:null,potential:null,final:null},
      {id:"Judithmarie Baldenegro",address:"1040 E 9th St, Douglas, AZ",market:"AZ",acq:"Luka",dispo:"Aubrey",status:"Closed - Lost",strategy:"Subject-to",exit:"Assignment",ucDate:"2024-05-01",closeDate:"2024-06-28",month:"06-24",contract:225000,listed:240000,buyer:null,repairs:null,potential:null,final:null}
    ];

    // ==================== UTILITIES ====================
    const TODAY = new Date('2026-04-13');
    let chartsCache = {};

    const fmt = (n) => {
      if (n === null || n === undefined) return '$0';
      return '$' + Math.round(n).toLocaleString();
    };

    const fmtPct = (p) => {
      if (isNaN(p)) return '0%';
      return Math.round(p * 100) + '%';
    };

    const daysBetween = (start, end) => {
      const s = new Date(start);
      const e = new Date(end);
      return Math.floor((e - s) / (1000 * 60 * 60 * 24));
    };

    const daysAgo = (dateStr) => {
      const d = new Date(dateStr);
      return Math.floor((TODAY - d) / (1000 * 60 * 60 * 24));
    };

    const createKpiCard = (label, value, color, onClick = null) => {
      const card = document.createElement('div');
      card.className = 'kpi-card';
      if (onClick) card.style.cursor = 'pointer';
      card.innerHTML = `
        <div style="font-size: 11px; font-weight: 600; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">${label}</div>
        <div style="font-size: 24px; font-weight: bold; color: ${color};">${value}</div>
      `;
      if (onClick) card.addEventListener('click', onClick);
      return card;
    };

    const renderDealTable = (deals, containerId) => {
      let html = `
        <table>
          <thead>
            <tr>
              <th>Deal</th>
              <th>Address</th>
              <th>Market</th>
              <th>Strategy</th>
              <th>Status</th>
              <th>Dispo</th>
              <th>Contract</th>
              <th>Days</th>
              <th>Profit</th>
            </tr>
          </thead>
          <tbody>
      `;

      deals.forEach(deal => {
        const days = ['Closed - Won', 'Closed - Lost'].includes(deal.status)
          ? daysBetween(deal.ucDate, deal.closeDate)
          : daysAgo(deal.ucDate);
        const profit = (deal.final !== null ? deal.final : deal.potential) || null;

        let statusClass = 'badge ';
        if (deal.status.includes('Under Contract')) statusClass += 'badge-uc';
        else if (deal.status.includes('Listed')) statusClass += 'badge-listed';
        else if (deal.status.includes('Won')) statusClass += 'badge-won';
        else if (deal.status.includes('Lost')) statusClass += 'badge-lost';

        html += `
          <tr>
            <td style="font-weight: 500;">${deal.id}</td>
            <td style="font-size: 12px; color: #666;">${deal.address}</td>
            <td style="font-weight: 500;">${deal.market}</td>
            <td>${deal.strategy}</td>
            <td><span class="${statusClass}">${deal.status}</span></td>
            <td>${deal.dispo}</td>
            <td style="font-weight: 500;">${fmt(deal.contract)}</td>
            <td style="text-align: right;">${days}d</td>
            <td style="font-weight: 500; color: #10b981;">${profit ? fmt(profit) : '-'}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      document.getElementById(containerId).innerHTML = html;
    };

    // ==================== CALCULATIONS ====================
    const calculateMetrics = () => {
      const active = DEALS.filter(d => ['Under Contract', 'Listed/Posted'].includes(d.status));
      const uc = DEALS.filter(d => d.status === 'Under Contract');
      const listed = DEALS.filter(d => d.status === 'Listed/Posted');
      const won = DEALS.filter(d => d.status === 'Closed - Won');
      const lost = DEALS.filter(d => d.status === 'Closed - Lost');

      const wonValue = won.reduce((s, d) => s + (d.buyer || 0), 0);
      const allFees = won.filter(d => d.final !== null).map(d => d.final);
      const avgFee = allFees.length > 0 ? allFees.reduce((s, f) => s + f, 0) / allFees.length : 0;

      const pipelineValue = active.reduce((s, d) => s + (d.contract || 0), 0);
      const largest = DEALS.reduce((max, d) => (d.contract || 0) > max ? (d.contract || 0) : max, 0);

      const closedDays = won.map(d => daysBetween(d.ucDate, d.closeDate));
      const avgClose = closedDays.length > 0 ? closedDays.reduce((s, d) => s + d, 0) / closedDays.length : 0;

      const over60 = active.filter(d => daysAgo(d.ucDate) > 60);

      return {
        active, uc, listed, won, lost,
        activeCount: active.length,
        ucCount: uc.length,
        listedCount: listed.length,
        totalCount: DEALS.length,
        wonCount: won.length,
        lostCount: lost.length,
        winRate: DEALS.length > 0 ? won.length / DEALS.length : 0,
        wonValue,
        avgFee: Math.round(avgFee),
        largest,
        pipelineValue,
        avgClose: Math.round(avgClose),
        over60Count: over60.length,
        over60,
        avgWonDays: closedDays.length > 0 ? Math.round(closedDays.reduce((s, d) => s + d, 0) / closedDays.length) : 0,
        avgLostDays: lost.length > 0 ? Math.round(lost.map(d => daysBetween(d.ucDate, d.closeDate)).reduce((s, d) => s + d, 0) / lost.length) : 0,
        fastestClose: closedDays.length > 0 ? Math.min(...closedDays) : 0,
        slowestClose: closedDays.length > 0 ? Math.max(...closedDays) : 0,
      };
    };

    const calculateStrategyMetrics = () => {
      const strategies = {};
      DEALS.forEach(d => {
        if (!strategies[d.strategy]) strategies[d.strategy] = {name: d.strategy, total: 0, won: 0, lost: 0, value: 0};
        strategies[d.strategy].total++;
        if (d.status === 'Closed - Won') {
          strategies[d.strategy].won++;
          strategies[d.strategy].value += (d.final !== null ? d.final : d.potential || 0);
        }
        if (d.status === 'Closed - Lost') strategies[d.strategy].lost++;
      });
      return Object.values(strategies).sort((a, b) => b.total - a.total);
    };

    const calculateMarketMetrics = () => {

      DEALS.forEach(d => {
        if (!markets[d.market]) markets[d.market] = {name: d.market, total: 0, won: 0, lost: 0};
        markets[d.market].total++;
        if (d.status === 'Closed - Won') markets[d.market].won++;
        if (d.status === 'Closed - Lost') markets[d.market].lost++;
      });
      return Object.values(markets).sort((a, b) => b.total - a.total).slice(0, 10);
    };

    const calculateAgingBuckets = (active) => {
      const buckets = {
        '0-30': {label: '0-30 Days', count: 0, deals: []},
        '31-60': {label: '31-60 Days', count: 0, deals: []},
        '61-90': {label: '61-90 Days', count: 0, deals: []},
        '90+': {label: '90+ Days', count: 0, deals: []}
      };
      active.forEach(d => {
        const age = daysAgo(d.ucDate);
        if (age <= 30) {
          buckets['0-30'].deals.push(d);
          buckets['0-30'].count++;
        } else if (age <= 60) {
          buckets['31-60'].deals.push(d);
          buckets['31-60'].count++;
        } else if (age <= 90) {
          buckets['61-90'].deals.push(d);
          buckets['61-90'].count++;
        } else {
          buckets['90+'].deals.push(d);
          buckets['90+'].count++;
        }
      });
      return buckets;
    };

        const active = deals.filter(d => ['Under Contract', 'Listed/Posted'].includes(d.status));
        teams[name] = {

          lost: lost.length,
          active: active.length,
          winRate: deals.length > 0 ? won.length / deals.length : 0,

    };

    const switchTab = (tab) => {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));

      // Show selected tab
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');

      // Close drill-downs
      closeDrillDown('exec');
      closeDrillDown('pipeline');
      closeDrillDown('team');

      // Render content
      if (tab === 'executive') renderExecutiveTab();
      else if (tab === 'pipeline') renderPipelineTab();
      else if (tab === 'team') renderTeamTab();
      else if (tab === 'monthly') renderMonthlyTab();
      else if (tab === 'roi') renderROITab();

      // Give charts time to render
      setTimeout(() => {
        window.dispatchEvent(new Event('resize'));
      }, 100);
    };

    // ==================== INITIALIZE ====================
    document.addEventListener('DOMContentLoaded', () => {
      renderExecutiveTab();
    });
  </script>
</body>
</html>
