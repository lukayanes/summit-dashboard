      font-weight: 600;
      color: #333;

    }

    }

      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;

    }

    .badge-lost {
      background-color: #ffebee;
      color: #d32f2f;
    }

    .tab-button {
      padding: 10px 16px;
      border: none;
      background: #e0e0e0;
      color: #333;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      border-radius: 4px 4px 0 0;
      margin-right: 2px;
    }

    .tab-button.active {
      background-color: white;
      color: #1B2A4A;
      border-bottom: 3px solid #2E75B6;
    }

    .tab-button:hover {
      background-color: #f0f0f0;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 8px;

    .metric-item {

      font-size: 14px;

    }

      color: #999;
      padding: 20px;

                  <td>{d.strategy}</td>
                  <td><Badge status={d.status} /></td>
                  <td>{d.dispo}</td>
                  <td className="font-medium">{fmt(d.contract)}</td>
                  <td className="text-right">{days}d</td>
                  <td className="font-medium text-green-600">{profit ? fmt(profit) : '-'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );

    // ==================== MAIN DASHBOARD ====================
    const Dashboard = () => {
      const [tab, setTab] = useState('executive');
      const [drillDown, setDrillDown] = useState(null);
      const [ageingBucket, setAgeingBucket] = useState(null);
      const [teamMember, setTeamMember] = useState(null);

      // Calculations
      const metrics = useMemo(() => {
        const active = DEALS.filter(d => ['Under Contract', 'Listed/Posted'].includes(d.status));
        const uc = DEALS.filter(d => d.status === 'Under Contract');
        const listed = DEALS.filter(d => d.status === 'Listed/Posted');
        const won = DEALS.filter(d => d.status === 'Closed - Won');
        const lost = DEALS.filter(d => d.status === 'Closed - Lost');

        const wonValue = won.reduce((s, d) => s + (d.buyer || 0), 0);
        const allFees = won.filter(d => d.final !== null).map(d => d.final);
        const avgFee = allFees.length > 0 ? allFees.reduce((s, f) => s + f, 0) / allFees.length : 0;

        const pipelineValue = active.reduce((s, d) => s + (d.contract || 0), 0);
        const largest = DEALS.reduce((max, d) => (d.contract || 0) > max ? (d.contract || 0) : max, 0);

        const closedDays = won.map(d => daysBetween(d.ucDate, d.closeDate));
        const avgClose = closedDays.length > 0 ? closedDays.reduce((s, d) => s + d, 0) / closedDays.length : 0;

        const over60 = active.filter(d => daysAgo(d.ucDate) > 60);

        const allMonths = {};
        DEALS.forEach(d => {
          if (!allMonths[d.month]) allMonths[d.month] = {month: d.month, total: 0, won: 0, lost: 0};
          allMonths[d.month].total++;
          if (d.status === 'Closed - Won') allMonths[d.month].won++;
          if (d.status === 'Closed - Lost') allMonths[d.month].lost++;
        });

        const monthlyRevenue = {};
        won.forEach(d => {
          if (!monthlyRevenue[d.month]) monthlyRevenue[d.month] = 0;
          monthlyRevenue[d.month] += (d.final !== null ? d.final : d.potential || 0);
        });

        return {
          active: active.length,
          uc: uc.length,
          listed: listed.length,
          total: DEALS.length,
          won: won.length,
          lost: lost.length,
          winRate: DEALS.length > 0 ? won.length / DEALS.length : 0,
          closeRate: active.length > 0 ? (won.length + lost.length) / DEALS.length : 0,
          wonValue,
          avgFee: Math.round(avgFee),
          largest,
          pipelineValue,
          avgClose: Math.round(avgClose),
          avgContract: DEALS.reduce((s, d) => s + (d.contract || 0), 0) / DEALS.filter(d => d.contract).length || 0,
          monthlyROAS: 250000 / 34500,
          over60: over60.length,
          active, uc, listed, won, lost, over60,
          allMonths: Object.values(allMonths).sort((a, b) => a.month.localeCompare(b.month)),
          monthlyRevenue,
          avgWonDays: Math.round(closedDays.reduce((s, d) => s + d, 0) / (closedDays.length || 1)),
          avgLostDays: Math.round(lost.map(d => daysBetween(d.ucDate, d.closeDate)).reduce((s, d) => s + d, 0) / (lost.length || 1)),
          fastestClose: Math.min(...closedDays, Infinity),
          slowestClose: Math.max(...closedDays, -Infinity),
        };
      }, []);

      const strategyMetrics = useMemo(() => {
        const strategies = {};
        DEALS.forEach(d => {
          if (!strategies[d.strategy]) strategies[d.strategy] = {name: d.strategy, total: 0, won: 0, lost: 0, value: 0};
          strategies[d.strategy].total++;
          if (d.status === 'Closed - Won') {
            strategies[d.strategy].won++;
            strategies[d.strategy].value += (d.final !== null ? d.final : d.potential || 0);
          }
          if (d.status === 'Closed - Lost') strategies[d.strategy].lost++;
        });
        return Object.values(strategies).sort((a, b) => b.total - a.total);
      }, []);

      const marketMetrics = useMemo(() => {
        const markets = {};
        DEALS.forEach(d => {
          if (!markets[d.market]) markets[d.market] = {name: d.market, total: 0, won: 0, lost: 0};
          markets[d.market].total++;
          if (d.status === 'Closed - Won') markets[d.market].won++;
          if (d.status === 'Closed - Lost') markets[d.market].lost++;
        });
        return Object.values(markets).sort((a, b) => b.total - a.total).slice(0, 10);
      }, []);

      const teamMetrics = useMemo(() => {
        const teams = {};
        ['Aubrey', 'Luka'].forEach(name => {
          const deals = DEALS.filter(d => d.dispo === name);
          const won = deals.filter(d => d.status === 'Closed - Won');
          const lost = deals.filter(d => d.status === 'Closed - Lost');
          const active = deals.filter(d => ['Under Contract', 'Listed/Posted'].includes(d.status));
          teams[name] = {
            total: deals.length,
            won: won.length,
            lost: lost.length,
            active: active.length,
            winRate: deals.length > 0 ? won.length / deals.length : 0,
            revenue: won.reduce((s, d) => s + (d.final !== null ? d.final : d.potential || 0), 0),
            avgFee: won.filter(d => d.final !== null).length > 0 ?
              won.filter(d => d.final !== null).reduce((s, d) => s + d.final, 0) / won.filter(d => d.final !== null).length : 0,
            pipelineValue: active.reduce((s, d) => s + (d.contract || 0), 0),
            deals
          };
        });
        return teams;
      }, []);

      const agingBuckets = useMemo(() => {
        const buckets = {
          '0-30': {label: '0-30 Days', deals: []},
          '31-60': {label: '31-60 Days', deals: []},
          '61-90': {label: '61-90 Days', deals: []},
          '90+': {label: '90+ Days', deals: []}
        };
        metrics.active.forEach(d => {
          const age = daysAgo(d.ucDate);
          if (age <= 30) buckets['0-30'].deals.push(d);
          else if (age <= 60) buckets['31-60'].deals.push(d);
          else if (age <= 90) buckets['61-90'].deals.push(d);
          else buckets['90+'].deals.push(d);
        });
        return buckets;
      }, [metrics.active]);

      // Reset drill-down when changing tabs
      const handleTabChange = (t) => {
        setTab(t);
        setDrillDown(null);
        setAgeingBucket(null);
        setTeamMember(null);
      };

      return (
        <div className="min-h-screen" style={{backgroundColor: '#F0F2F5'}}>
          {/* Header */}
          <div className="navy-header text-white p-6 shadow-lg">
            <h1 className="text-3xl font-bold">SUMMIT GROUP ACQUISITIONS</h1>
            <p className="text-sm text-gray-300 mt-1">Real Estate Wholesaling KPI Dashboard</p>
          </div>

          {/* Tabs */}
          <div className="px-6 pt-6 flex gap-1 flex-wrap">
            {[
              {id: 'executive', label: 'Executive Dashboard'},
              {id: 'pipeline', label: 'Pipeline Analytics'},
              {id: 'team', label: 'Team Scorecard'},
              {id: 'monthly', label: 'Monthly Trends'},
              {id: 'roi', label: 'Marketing ROI'}
            ].map(t => (
              <button
                key={t.id}
                className={`tab-button ${tab === t.id ? 'active' : ''}`}
                onClick={() => handleTabChange(t.id)}
              >
                {t.label}
              </button>
            ))}
          </div>

          <div className="p-6">
            {/* EXECUTIVE DASHBOARD */}
            {tab === 'executive' && (
              <>
                {/* Top KPIs */}
                <div className="grid grid-cols-8 gap-4 mb-6">
                  <KpiCard label="Active Deals" value={metrics.active} color="#2E75B6"
                    onClick={() => setDrillDown('active')} active={drillDown === 'active'} />
                  <KpiCard label="Under Contract" value={metrics.uc} color="#ED7D31" />
                  <KpiCard label="Listed/Posted" value={metrics.listed} color="#FFC000" />
                  <KpiCard label="Total Deals" value={metrics.total} color="#1B2A4A" />
                  <KpiCard label="Closed-Won" value={metrics.won} color="#548235"
                    onClick={() => setDrillDown('won')} active={drillDown === 'won'} />
                  <KpiCard label="Closed-Lost" value={metrics.lost} color="#C00000"
                    onClick={() => setDrillDown('lost')} active={drillDown === 'lost'} />
                  <KpiCard label="Win Rate" value={fmtPct(metrics.winRate)} color="#7030A0" />
                  <KpiCard label="Close Rate" value={fmtPct(metrics.closeRate)} color="#2F9599" />
                </div>

                <div className="grid grid-cols-8 gap-4 mb-6">
                  <KpiCard label="Total Revenue" value={fmt(metrics.wonValue)} color="#548235" />
                  <KpiCard label="Avg Fee" value={fmt(metrics.avgFee)} color="#2E75B6" />
                  <KpiCard label="Largest Deal" value={fmt(metrics.largest)} color="#ED7D31" />
                  <KpiCard label="Pipeline Value" value={fmt(metrics.pipelineValue)} color="#FFC000" />
                  <KpiCard label="Avg Days Close" value={Math.round(metrics.avgClose)} color="#7030A0" />
                  <KpiCard label="Avg Contract" value={fmt(metrics.avgContract)} color="#2F9599" />
                  <KpiCard label="Monthly ROAS" value={metrics.monthlyROAS.toFixed(1) + 'x'} color="#C00000" />
                  <KpiCard label="Deals 60+ Days" value={metrics.over60} color="#C00000"
                    onClick={() => setDrillDown('over60')} active={drillDown === 'over60'} />
                </div>

                {/* Drill-down table */}
                {drillDown && (
                  <>
                    <Section title={`${drillDown.toUpperCase()} DEALS`} bgColor="#1B2A4A">
                      <DealTable deals={
                        drillDown === 'active' ? metrics.active :
                        drillDown === 'won' ? metrics.won :
                        drillDown === 'lost' ? metrics.lost :
                        metrics.over60
                      } />
                    </Section>
                  </>
                )}

                {/* Strategy Performance */}
                <div className="grid grid-cols-2 gap-6 mb-6">
                  <Section title="Strategy Performance - Volume" bgColor="#2E75B6">
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={strategyMetrics}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="name" />
                        <YAxis />
                        <Tooltip />
                        <Legend />
                        <Bar dataKey="total" fill="#2E75B6" name="Total" />
                        <Bar dataKey="won" fill="#548235" name="Won" />
                        <Bar dataKey="lost" fill="#C00000" name="Lost" />
                      </BarChart>
                    </ResponsiveContainer>
                  </Section>

                  <Section title="Win Rate by Strategy" bgColor="#548235">
                    <ResponsiveContainer width="100%" height={300}>
                      <BarChart data={strategyMetrics.map(s => ({...s, winRate: s.total > 0 ? (s.won / s.total * 100) : 0}))}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="name" />
                        <YAxis label={{value: '%', angle: -90, position: 'insideLeft'}} />
                        <Tooltip formatter={(v) => v.toFixed(1) + '%'} />
                        <Bar dataKey="winRate" fill="#548235" />
                      </BarChart>
                    </ResponsiveContainer>
                  </Section>
                </div>

                {/* Revenue by Strategy */}
                <Section title="Revenue by Strategy" bgColor="#ED7D31">
                  <ResponsiveContainer width="100%" height={300}>
                    <PieChart>
                      <Pie dataKey="value" data={strategyMetrics.filter(s => s.value > 0)} label={({name, percent}) => `${name} ${(percent * 100).toFixed(0)}%`}>
                        {['#2E75B6', '#548235', '#C00000', '#FFC000', '#7030A0', '#2F9599', '#ED7D31'].map((c, i) => <Cell key={i} fill={c} />)}
                      </Pie>
                      <Tooltip formatter={(v) => fmt(v)} />
                    </PieChart>
                  </ResponsiveContainer>
                </Section>
              </>
            )}

            {/* PIPELINE ANALYTICS */}
            {tab === 'pipeline' && (
              <>
                <div className="grid grid-cols-5 gap-4 mb-6">
                  <KpiCard label="Avg Days Won" value={metrics.avgWonDays} color="#548235" />
                  <KpiCard label="Avg Days Lost" value={metrics.avgLostDays} color="#C00000" />
                  <KpiCard label="Fastest Close" value={metrics.fastestClose} color="#2E75B6" />
                  <KpiCard label="Slowest Close" value={metrics.slowestClose} color="#ED7D31" />
                  <KpiCard label="Avg Active Age" value={Math.round(metrics.active.map(d => daysAgo(d.ucDate)).reduce((s, d) => s + d, 0) / (metrics.active.length || 1))} color="#2F9599" />
                </div>

                <div className="grid grid-cols-4 gap-4 mb-6">
                  {Object.entries(agingBuckets).map(([key, bucket]) => (
                    <KpiCard
                      key={key}
                      label={bucket.label}
                      value={bucket.deals.length}
                      color={key === '0-30' ? '#548235' : key === '31-60' ? '#FFC000' : key === '61-90' ? '#ED7D31' : '#C00000'}
                      onClick={() => setAgeingBucket(key)}
                      active={ageingBucket === key}
                    />
                  ))}
                </div>

                {ageingBucket && (
                  <Section title={`Deals: ${agingBuckets[ageingBucket].label}`} bgColor="#1B2A4A">
                    <DealTable deals={agingBuckets[ageingBucket].deals} />
                  </Section>
                )}

                <Section title="Aging Distribution" bgColor="#2E75B6">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={Object.entries(agingBuckets).map(([k, v]) => ({name: v.label, count: v.deals.length}))}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="name" />
                      <YAxis />
                      <Tooltip />
                      <Bar dataKey="count" fill="#2E75B6" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Market Concentration" bgColor="#ED7D31">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={marketMetrics} layout="vertical">
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis type="number" />
                      <YAxis type="category" dataKey="name" />
                      <Tooltip />
                      <Bar dataKey="total" fill="#ED7D31" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>
              </>
            )}

            {/* TEAM SCORECARD */}
            {tab === 'team' && (
              <>
                <div className="grid grid-cols-2 gap-6 mb-6">
                  {['Aubrey', 'Luka'].map(member => {
                    const m = teamMetrics[member];
                    return (
                      <div key={member}>
                        <div
                          className="bg-white p-4 rounded-lg border-2 cursor-pointer"
                          style={{borderColor: teamMember === member ? '#2E75B6' : 'transparent'}}
                          onClick={() => setTeamMember(teamMember === member ? null : member)}
                        >
                          <h3 className="text-xl font-bold text-gray-800 mb-4">{member}</h3>
                          <div className="metric-row">
                            <div className="metric-item">
                              <div className="metric-label">Total</div>
                              <div className="metric-value">{m.total}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Won</div>
                              <div className="metric-value text-green-600">{m.won}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Lost</div>
                              <div className="metric-value text-red-600">{m.lost}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Win Rate</div>
                              <div className="metric-value">{fmtPct(m.winRate)}</div>
                            </div>
                          </div>
                          <div className="metric-row mt-4 border-t pt-4">
                            <div className="metric-item">
                              <div className="metric-label">Revenue</div>
                              <div className="metric-value">{fmt(m.revenue)}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Avg Fee</div>
                              <div className="metric-value">{fmt(m.avgFee)}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Pipeline</div>
                              <div className="metric-value">{fmt(m.pipelineValue)}</div>
                            </div>
                            <div className="metric-item">
                              <div className="metric-label">Active</div>
                              <div className="metric-value">{m.active}</div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {teamMember && (
                  <Section title={`${teamMember}'s Deals`} bgColor="#1B2A4A">
                    <DealTable deals={teamMetrics[teamMember].deals} />
                  </Section>
                )}

                <Section title="Comparison" bgColor="#2E75B6">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={[
                      {name: 'Won', Aubrey: teamMetrics['Aubrey'].won, Luka: teamMetrics['Luka'].won},
                      {name: 'Lost', Aubrey: teamMetrics['Aubrey'].lost, Luka: teamMetrics['Luka'].lost},
                      {name: 'Active', Aubrey: teamMetrics['Aubrey'].active, Luka: teamMetrics['Luka'].active}
                    ]}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="name" />
                      <YAxis />
                      <Tooltip />
                      <Legend />
                      <Bar dataKey="Aubrey" fill="#2E75B6" />
                      <Bar dataKey="Luka" fill="#548235" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Revenue Comparison" bgColor="#548235">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={[
                      {name: 'Revenue', Aubrey: teamMetrics['Aubrey'].revenue, Luka: teamMetrics['Luka'].revenue}
                    ]}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="name" />
                      <YAxis />
                      <Tooltip formatter={(v) => fmt(v)} />
                      <Legend />
                      <Bar dataKey="Aubrey" fill="#2E75B6" />
                      <Bar dataKey="Luka" fill="#548235" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>
              </>
            )}

            {/* MONTHLY TRENDS */}
            {tab === 'monthly' && (
              <>
                <Section title="Monthly Deal Flow" bgColor="#2E75B6">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={metrics.allMonths}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="month" />
                      <YAxis />
                      <Tooltip />
                      <Legend />
                      <Bar dataKey="total" fill="#1B2A4A" name="New Deals" />
                      <Bar dataKey="won" fill="#548235" name="Won" />
                      <Bar dataKey="lost" fill="#C00000" name="Lost" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Monthly Revenue" bgColor="#548235">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={Object.entries(metrics.monthlyRevenue).map(([m, v]) => ({month: m, revenue: v}))}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="month" />
                      <YAxis />
                      <Tooltip formatter={(v) => fmt(v)} />
                      <Bar dataKey="revenue" fill="#548235" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Cumulative Revenue" bgColor="#ED7D31">
                  <ResponsiveContainer width="100%" height={300}>
                    <AreaChart data={(() => {
                      const sorted = Object.entries(metrics.monthlyRevenue).sort((a, b) => a[0].localeCompare(b[0]));
                      let cum = 0;
                      return sorted.map(([m, v]) => {
                        cum += v;
                        return {month: m, cumulative: cum};
                      });
                    })()}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="month" />
                      <YAxis />
                      <Tooltip formatter={(v) => fmt(v)} />
                      <Area type="monotone" dataKey="cumulative" fill="#ED7D31" stroke="#ED7D31" />
                    </AreaChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Closed-Won Deals" bgColor="#2F9599">
                  <DealTable deals={metrics.won} />
                </Section>
              </>
            )}

            {/* MARKETING ROI */}
            {tab === 'roi' && (
              <>
                <div className="grid grid-cols-4 gap-4 mb-6">
                  <KpiCard label="Monthly Spend" value="$34,500" color="#2E75B6" />
                  <KpiCard label="Total Revenue" value={fmt(metrics.wonValue)} color="#548235" />
                  <KpiCard label="Monthly ROAS" value={metrics.monthlyROAS.toFixed(1) + 'x'} color="#2F9599" />
                  <KpiCard label="Cost Per Won" value={fmt(34500 / (metrics.won || 1))} color="#ED7D31" />
                </div>

                <div className="grid grid-cols-4 gap-4 mb-6">
                  <KpiCard label="Months Active" value="23" color="#FFC000" />
                  <KpiCard label="Est Total Spend" value={fmt(34500 * 23)} color="#7030A0" />
                  <KpiCard label="All-Time ROAS" value={(metrics.wonValue / (34500 * 23)).toFixed(1) + 'x'} color="#C00000" />
                  <KpiCard label="Break-Even/Mo" value={Math.ceil(34500 / (metrics.avgFee || 1))} color="#1B2A4A" />
                </div>

                <Section title="ROI Scenario Analysis" bgColor="#2E75B6">
                  <ResponsiveContainer width="100%" height={300}>
                    <BarChart data={[
                      {spend: 10000, expectedWon: Math.ceil(10000 / (34500 / (metrics.won || 1))), expectedRevenue: Math.ceil(10000 * metrics.monthlyROAS)},
                      {spend: 20000, expectedWon: Math.ceil(20000 / (34500 / (metrics.won || 1))), expectedRevenue: Math.ceil(20000 * metrics.monthlyROAS)},
                      {spend: 34500, expectedWon: metrics.won, expectedRevenue: metrics.wonValue},
                      {spend: 50000, expectedWon: Math.ceil(50000 / (34500 / (metrics.won || 1))), expectedRevenue: Math.ceil(50000 * metrics.monthlyROAS)},
                      {spend: 75000, expectedWon: Math.ceil(75000 / (34500 / (metrics.won || 1))), expectedRevenue: Math.ceil(75000 * metrics.monthlyROAS)},
                      {spend: 100000, expectedWon: Math.ceil(100000 / (34500 / (metrics.won || 1))), expectedRevenue: Math.ceil(100000 * metrics.monthlyROAS)}
                    ]}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="spend" tickFormatter={(v) => '$' + v/1000 + 'k'} />
                      <YAxis yAxisId="left" label={{value: 'Revenue', angle: -90, position: 'insideLeft'}} />
                      <YAxis yAxisId="right" orientation="right" label={{value: 'Deals', angle: 90, position: 'insideRight'}} />
                      <Tooltip formatter={(v, name) => name === 'expectedRevenue' ? fmt(v) : v} />
                      <Legend />
                      <Bar yAxisId="left" dataKey="expectedRevenue" fill="#548235" name="Expected Revenue" />
                      <Bar yAxisId="right" dataKey="expectedWon" fill="#2E75B6" name="Expected Won Deals" />
                    </BarChart>
                  </ResponsiveContainer>
                </Section>

                <Section title="Scenario Details" bgColor="#548235">
                  <div className="table-container">
                    <table>
                      <thead>
                        <tr>
                          <th>Monthly Spend</th>
                          <th>Expected Won Deals</th>
                          <th>Expected Revenue</th>
                          <th>Profit (Revenue - Spend)</th>
                          <th>ROI</th>
                        </tr>
                      </thead>
                      <tbody>
                        {[10000, 20000, 34500, 50000, 75000, 100000].map((spend, i) => {
                          const won = Math.ceil(spend / (34500 / (metrics.won || 1)));
                          const revenue = Math.ceil(spend * metrics.monthlyROAS);
                          const profit = revenue - spend;
                          const roi = (profit / spend * 100);
                          return (
                            <tr key={i}>
                              <td className="font-medium">{fmt(spend)}</td>
                              <td className="text-center">{won}</td>
                              <td className="font-medium text-green-600">{fmt(revenue)}</td>
                              <td className="font-medium">{fmt(profit)}</td>
                              <td className="font-medium">{roi.toFixed(0)}%</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </Section>
              </>
            )}
          </div>
        </div>
      );
    };

    // ==================== RENDER ====================
